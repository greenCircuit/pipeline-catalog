#######
# manual way of doing releases jobs 
#######
.changelog:
  image: registry.dev.local/home-lab/pipeline-catalog:latest
  stage: release
  variables:
    version: ""
  script: | # shell
    git config --global user.email ${GITLAB_USER_EMAIL}
    git config --global user.name  ${CI_COMMIT_AUTHOR}
    git config http.sslVerify false  # using self signed certs 
    git checkout ${CI_COMMIT_BRANCH}
    git branch
    git remote add gitlab_pipeline "https://GIT_REPO_TOKEN:${GIT_REPO_TOKEN}@gitlab.dev.local//${CI_PROJECT_PATH}.git"

    echo "## ${version} - ${CI_COMMIT_MESSAGE}" >> CHANGELOG.md
    echo "$(date '+%Y-%m-%d')" >> CHANGELOG.md
    echo "- Commit URL: http://gitlab.dev.local/${CI_PROJECT_PATH}/-/tree/${CI_COMMIT_SHA}" >> CHANGELOG.md
    echo "- Pipeline: ${CI_PIPELINE_URL}" >> CHANGELOG.md
    echo "<br>" >> CHANGELOG.md
    echo "" >> CHANGELOG.md

    cat CHANGELOG.md
    if [[ $MAKE_RELEASE == "true" ]]; then
      git add CHANGELOG.md
      git commit -m "automated change log"
      git push gitlab_pipeline -o ci.skip
    else
      echo not committing changelog
    fi

.create-tag:
  image: registry.dev.local/home-lab/pipeline-catalog:latest
  stage: release
  variables:
    GIT_TAG: ""
  script: | # shell
    echo "Tag set:  $version"
    if [[ $MAKE_RELEASE == "true" ]]; then
      git config --global user.email ${CI_COMMIT_AUTHOR}
      git config --global user.name  ${GITLAB_USER_NAME}
      git remote add gitlab_ci "http://GIT_REPO_TOKEN:${GIT_REPO_TOKEN}@gitlab.dev.local//${CI_PROJECT_PATH}.git"
      git tag -a ${GIT_TAG} -m "ci repo tag"
      git push gitlab_ci --tags -o ci.skip
    else 
      echo not making git tag
    fi

.make-semver:
  image: registry.dev.local/home-lab/pipeline-catalog:latest
  stage: semver 
  script: | # shell
    # Exit script if command fails or uninitialized variables used
    # set -euo pipefail
    # GLOBAL VARS
    patchRegex="^(fix|docs):"
    minorRegex="^(feat|feature):"
    majorRegex="^(major):"

    # get tags from remote 
    git checkout "${CI_DEFAULT_BRANCH}"; git pull     # go to main branch to get all tags
    GIT_TAGS=$(git tag --list '[0-9]*.[0-9]*.[0-9]*') # use regex to find correct semver tag
    echo "All tags: $GIT_TAGS"
    GIT_TAG_LATEST=$(echo "$GIT_TAGS" | tail -n 1)                  
    echo "GIT_TAG_LATEST:       ${GIT_TAG_LATEST}"
    # If no tag found, set to default
    if [ -z "$GIT_TAG_LATEST" ]; then
        echo "Dint find git tag, setting default, exiting"
        exit 1
        # GIT_TAG_LATEST="0.0.0"
    else
        echo "Latest tag found      ${GIT_TAG_LATEST}"
    fi

    VERSION_TYPE=""
    echo "commit message:       ${CI_COMMIT_MESSAGE}"

    # use regex to determine what changed
    if [[ $CI_COMMIT_MESSAGE =~ ${patchRegex} ]]; then
        VERSION_TYPE="patch"
    elif [[ $CI_COMMIT_MESSAGE =~ ${minorRegex} ]]; then
        VERSION_TYPE="minor"
    elif [[ $CI_COMMIT_MESSAGE =~ ${majorRegex} ]]; then
        VERSION_TYPE="major"
    fi

    # main gating method if want to update semver
    echo "VERSION_TYPE found:   ${VERSION_TYPE}"
    if [[ "${VERSION_TYPE}" == "" || "${CI_COMMIT_BRANCH}" != "${CI_DEFAULT_BRANCH}"  ]]; then
        echo "no semver provided inside commit message or not default branch"
        echo "SEMVER=${GIT_TAG_LATEST}" > semver.env
        exit 0
    fi

    # update semver when merge or main was provided with semver
    VERSION_NEXT=""
    if [[ $VERSION_TYPE != "" ]]; then
        echo "updating semver"
        if [ "${VERSION_TYPE}" = "patch" ]; then
            VERSION_NEXT=$(echo "$GIT_TAG_LATEST" | awk -F. '{ $NF++; print $1 "." $2 "." $NF }')
        elif [ "${VERSION_TYPE}" = "minor" ]; then
            VERSION_NEXT=$(echo "$GIT_TAG_LATEST" | awk -F. '{ $2++; $3=0; print $1 "." $2 "." $3 }')
        elif [ "${VERSION_TYPE}" = "major" ]; then
            VERSION_NEXT=$(echo "$GIT_TAG_LATEST" | awk -F. '{ $1++; $2=0; $3=0; print $1 "." $2 "." $3 }')
        else
            echo "Not updating version, VERSION_TYPE can only be patch, minor, major"
            exit 1
        fi
    fi

    echo "Next Version: ${VERSION_NEXT}"
    echo "SEMVER=${VERSION_NEXT}" >> semver.env
    echo "MAKE_RELEASE=true" >> semver.env
  artifacts:
    reports:
      dotenv: semver.env

#######
# Use semantic release npm module to manage semantic releases  
#######
.semantic-release-dry-run:
  stage: semver
  image: node:20
  before_script:
    - npm install semantic-release @semantic-release/exec @semantic-release/git @semantic-release/gitlab
  script: |
    # Run semantic-release and capture all output
    npx semantic-release --dry-run > release.log
    cat release.log
    
    # 1. Determine CURRENT_VERSION
    CURRENT_VERSION=$(grep -i 'associated with version' release.log | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
    echo "CURRENT_VERSION=$CURRENT_VERSION" >> build.env
    
    # 2. Determine MAKE_RELEASE flag directly to the artifact
    if grep -qi 'the next release version is' release.log; then 
      echo "MAKE_RELEASE=TRUE" >> build.env
      
    else 
      echo "MAKE_RELEASE=FALSE" >> build.env
    fi
    
    # 3. Determine NEXT_VERSION, if not set use CURRENT_VERSION
    NEXT_VERSION=$(grep -i 'the next release version is' release.log | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
    if [ -z "$NEXT_VERSION" ]; then NEXT_VERSION=$CURRENT_VERSION; fi
    echo "NEXT_VERSION=$NEXT_VERSION" >> build.env

    # this will point always to new version if release is available or a current version where there is no release 
    BUILD_VERSION=$NEXT_VERSION
    echo "BUILD_VERSION=$BUILD_VERSION" >> build.env

    echo "=== Exported Variables ==="
    cat build.env
  artifacts:
    reports:
      dotenv: build.env

.test-release:
  stage: semver 
  image: alpine:latest
  needs: ["release-dry-run"]
  script:
    - echo "The current deployed version is $CURRENT_VERSION"
    - echo "We are building next version $NEXT_VERSION"
    - echo "New release $MAKE_RELEASE"
    # Check if variables are empty and exit if they are
    - if [ -z "$CURRENT_VERSION" ]; then echo "Error - CURRENT_VERSION is not set or empty"; exit 1; fi
    - if [ -z "$NEXT_VERSION" ]; then echo "Error - NEXT_VERSION is not set or empty"; exit 1; fi
    - if [ -z "$MAKE_RELEASE" ]; then echo "Error - MAKE_RELEASE is not set or empty"; exit 1; fi
    - if [ -z "$BUILD_VERSION" ]; then echo "Error - BUILD_VERSION is not set or empty"; exit 1; fi

.publish-release:
  stage: release
  image: node:20
  variables:
    GITLAB_TOKEN: "${CI_JOB_TOKEN}"
  before_script:
    - npm install semantic-release @semantic-release/exec @semantic-release/git @semantic-release/gitlab
  script:
    # determining if need to create new version or not
    - |
      npx semantic-release --dry-run > release.log 
      cat release.log
      if ! grep -qi 'the next release version is' release.log; then 
        echo "Semantic-release determined no new version is required. Exiting cleanly."
        exit 0
      fi
    - echo "=== Preparing Custom Changelog Script ==="
    - |
      cat << 'EOF' > update-changelog.sh
      #!/bin/bash
      VERSION=$1
      echo "## ${VERSION} - ${CI_COMMIT_MESSAGE}" >> CHANGELOG.md
      echo "$(date '+%Y-%m-%d')" >> CHANGELOG.md
      echo "- Commit URL: http://gitlab.dev.local/${CI_PROJECT_PATH}/-/tree/${CI_COMMIT_SHA}" >> CHANGELOG.md
      echo "- Pipeline: ${CI_PIPELINE_URL}" >> CHANGELOG.md
      echo "<br>" >> CHANGELOG.md
      echo "" >> CHANGELOG.md
      EOF
    - chmod +x update-changelog.sh
    - echo "=== Executing Semantic Release ==="
    - npx semantic-release
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'