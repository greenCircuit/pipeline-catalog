variables:
  MAKE_RELEASE: "false"  # will be overwritten by semver job
  SEMVER: "0.0.1"


include:
  # pipeline jobs 
  - pipelines/stages.yaml
  - pipelines/build.yaml
  - pipelines/k8s.yaml
  - pipelines/security.yaml
  - pipelines/template.yml
  - pipelines/release.yaml
  # tests for pipeline jobs
  - local: test-data/test-pipelines/test-k8s.yaml
    rules:
      - changes:
          - "test-data/**/*"
          - "containerfiles/Dockerfile.k8s"
          - "pipelines/k8s.yaml"

    
# running all pipelines in order to validate them
# Creating pipeline images
img-k8s:
  extends: .create_image
  variables:
    FILE_PATH: "containerfiles/Dockerfile.k8s"
    REGISTRY_PATH: "k8s"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - changes: ["containerfiles/Dockerfile.k8s"]

semver-img:
  extends: .create_image
  variables:
    FILE_PATH: "containerfiles/Dockerfile.semver"
    REGISTRY_PATH: "semver"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - changes: ["containerfiles/Dockerfile.semver"]


# testing img building that correct tag is created
img-base:
  extends: .create_image
  stage: unit-test
  variables:
    FILE_PATH: "containerfiles/Dockerfile"
    REGISTRY_PATH: ""

git-leaks:
  extends: .secrets_scan

# releases jobs
release-dry-run:
  extends: .semantic-release-dry-run

test-release-dry-run: 
  extends: .test-release

create-release: 
  extends: .publish-release
